name: Bug Report
description: Report a bug in create-turbo-stack
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `npx create-turbo-stack ...`
        2. Select ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: CLI version
      description: Run `npx create-turbo-stack --version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: pm
    attributes:
      label: Package manager
      options:
        - bun
        - pnpm
        - npm
        - yarn
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows (WSL2)
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.0.0"
    validations:
      required: true
